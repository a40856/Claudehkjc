# .github/workflows/predict-schedule.yml
# Runs predict.py automatically the evening before each race day
# Saves XLSX predictions as artifacts + commits to data/ branch

name: HKJC Predict

on:
  schedule:
    # Runs 09:00 HKT = 01:00 UTC every day
    # predict.py itself checks if tomorrow is a race day — exits cleanly if not
    - cron: "0 1 * * *"

  # Allow manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      date:
        description: "Race date (YYYY/MM/DD)"
        required: false
        default: ""
      venue:
        description: "Venue (ST or HV)"
        required: false
        default: ""

jobs:
  predict:
    name: Run Prediction Engine
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      race_pre_race: ${{ steps.check-race.outputs.race_pre_race }}
      race_tag: ${{ steps.check-race.outputs.race_tag }}
      race_date: ${{ steps.check-race.outputs.race_date }}
      race_venue: ${{ steps.check-race.outputs.race_venue }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers + system libs
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Check if race is scheduled today or tomorrow and run prediction
        id: check-race
        env:
          TZ: Asia/Hong_Kong
        run: |
          # Run scheduler to check for today or tomorrow
          if [ -n "${{ github.event.inputs.date }}" ]; then
            # Manual trigger — always run
            python predict.py \
              --date "${{ github.event.inputs.date }}" \
              --venue "${{ github.event.inputs.venue || 'ST' }}"
            echo "race_pre_race=true" >> $GITHUB_OUTPUT
            date_formatted="${{ github.event.inputs.date }}"
            venue_formatted="${{ github.event.inputs.venue || 'ST' }}"
            race_tag="${date_formatted//\//-}_${venue_formatted}"
            echo "race_tag=${race_tag}" >> $GITHUB_OUTPUT
            echo "race_date=${date_formatted}" >> $GITHUB_OUTPUT
            echo "race_venue=${venue_formatted}" >> $GITHUB_OUTPUT
          else
            # Scheduled run — check if race tomorrow or today
            output=$(python scheduler.py --check-and-run 2>&1 || true)
            echo "Scheduler output:"
            echo "$output"
            
            # Parse output for RACE_PRE_RACE flag
            if echo "$output" | grep -q "^RACE_PRE_RACE=true"; then
              echo "race_pre_race=true" >> $GITHUB_OUTPUT
              race_tag=$(echo "$output" | grep "^RACE_TAG=" | cut -d'=' -f2)
              race_date=$(echo "$output" | grep "^RACE_DATE=" | cut -d'=' -f2)
              race_venue=$(echo "$output" | grep "^RACE_VENUE=" | cut -d'=' -f2)
              echo "race_tag=${race_tag}" >> $GITHUB_OUTPUT
              echo "race_date=${race_date}" >> $GITHUB_OUTPUT
              echo "race_venue=${race_venue}" >> $GITHUB_OUTPUT
            else
              echo "race_pre_race=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Sync predictions to web directory
        if: steps.check-race.outputs.race_pre_race == 'true'
        run: |
          # Copy XLSX files to web directory
          mkdir -p docs/data/predictions docs/data/raw
          cp -v data/predictions/*.xlsx docs/data/predictions/ 2>/dev/null || true
          cp -v data/raw/*.xlsx docs/data/raw/ 2>/dev/null || true
          
          # Generate index.json for web frontend
          python3 << 'PYSCRIPT'
          import json
          import os
          from pathlib import Path
          from datetime import datetime
          
          pred_dir = Path("docs/data/predictions")
          pred_dir.mkdir(parents=True, exist_ok=True)
          
          # Find all XLSX files
          entries = []
          for xlsx_file in sorted(pred_dir.glob("*.xlsx"), reverse=True):
              # Parse filename: YYYY-MM-DD_VN.xlsx
              fname = xlsx_file.stem
              parts = fname.split("_")
              if len(parts) >= 2:
                  date_str = parts[0]  # YYYY-MM-DD
                  venue = parts[1]     # VN
                  # Convert to YYYY/MM/DD for display
                  date_display = date_str.replace("-", "/")
                  entries.append({
                      "file": xlsx_file.name,
                      "date": date_display,
                      "venue": venue
                  })
          
          # Write index.json
          index = {"entries": entries, "updated_at": datetime.now().isoformat()}
          with open(pred_dir / "index.json", "w") as f:
              json.dump(index, f, indent=2)
          
          print(f"✓ Generated index.json with {len(entries)} entries")
          PYSCRIPT

      - name: Upload prediction XLSX
        if: steps.check-race.outputs.race_pre_race == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: predictions-${{ steps.check-race.outputs.race_tag }}
          path: |
            data/predictions/*.xlsx
            data/raw/*.xlsx
            docs/data/predictions/index.json
          retention-days: 90

      - name: Commit data files to repo
        if: steps.check-race.outputs.race_pre_race == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "data/predictions/" ]; then git add data/predictions/; fi
          if [ -d "data/raw/" ]; then git add data/raw/; fi
          if [ -d "docs/data/" ]; then git add docs/data/; fi
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🏇 Auto-predict ${{ steps.check-race.outputs.race_tag }}"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

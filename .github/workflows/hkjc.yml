# ─────────────────────────────────────────────────────────────────────────────
# hkjc.yml — Environment & Dependency Specification
# HKJC Horse Racing Prediction System
# ─────────────────────────────────────────────────────────────────────────────
#
# Setup (first time):
#   conda env create -f hkjc.yml
#   conda activate hkjc
#
# Update existing env after changes:
#   conda env update -f hkjc.yml --prune
#
# Remove env completely:
#   conda deactivate && conda env remove -n hkjc
#
# ─────────────────────────────────────────────────────────────────────────────

name: hkjc

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ──────────────────────────────────────────────────────────────────
  - python=3.11

  # ── Core data ───────────────────────────────────────────────────────────────
  - numpy>=1.26
  - pandas>=2.2
  - scipy>=1.13           # for future ML / statistical work (Option B)

  # ── Web scraping ─────────────────────────────────────────────────────────────
  - requests>=2.31
  - beautifulsoup4>=4.12
  - lxml>=5.1             # fast HTML/XML parser for BeautifulSoup
  - html5lib              # fallback parser for malformed HKJC pages

  # ── Scheduling ───────────────────────────────────────────────────────────────
  - apscheduler>=3.10     # in-process fallback (macOS uses launchd instead)

  # ── CLI & utilities ──────────────────────────────────────────────────────────
  - tqdm>=4.66            # progress bars (horse history fetch loop)
  - python-dateutil>=2.9  # robust date parsing
  - pytz>=2024.1          # timezone: Asia/Hong_Kong

  # ── Output ───────────────────────────────────────────────────────────────────
  - openpyxl>=3.1         # write .xlsx for manual review if needed
  - tabulate>=0.9         # pretty-print tables in terminal

  # ── Development tools ────────────────────────────────────────────────────────
  - ipython
  - jupyter
  - black                 # code formatter

  # ── pip-only packages ─────────────────────────────────────────────────────────
  - pip
  - pip:
    - playwright>=1.43    # headless browser for JS-rendered HKJC pages
                          # After install run: playwright install chromium

# .github/workflows/hkjc.yml
# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions — CI checks for HKJC Prediction System
# Runs on every push/PR to main:
#   1. Installs dependencies
#   2. Validates config.py imports cleanly
#   3. Runs a dry-run syntax check on predict.py and review.py
# ─────────────────────────────────────────────────────────────────────────────

name: HKJC CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Python files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check — config.py
        run: python -m py_compile config.py && echo "config.py OK"

      - name: Syntax check — predict.py
        run: python -m py_compile predict.py && echo "predict.py OK"

      - name: Syntax check — review.py
        run: python -m py_compile review.py && echo "review.py OK"

      - name: Syntax check — scheduler.py
        run: python -m py_compile scheduler.py && echo "scheduler.py OK"

      - name: Validate WEIGHTS sum to 1.0
        run: |
          python - <<'EOF'
          from config import WEIGHTS_GENERAL, WEIGHTS_CLASSIC
          assert abs(sum(WEIGHTS_GENERAL.values()) - 1.0) < 0.001, \
              f"WEIGHTS_GENERAL sums to {sum(WEIGHTS_GENERAL.values())}"
          assert abs(sum(WEIGHTS_CLASSIC.values()) - 1.0) < 0.001, \
              f"WEIGHTS_CLASSIC sums to {sum(WEIGHTS_CLASSIC.values())}"
          print("✓ WEIGHTS_GENERAL:", sum(WEIGHTS_GENERAL.values()))
          print("✓ WEIGHTS_CLASSIC:", sum(WEIGHTS_CLASSIC.values()))
          EOF

# .github/workflows/hkjc.yml
# Runs on every push/PR — syntax + weight validation only

name: HKJC CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Python files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers + system libs
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Syntax check — config.py
        run: python -m py_compile config.py && echo "✓ config.py OK"

      - name: Syntax check — predict.py
        run: python -m py_compile predict.py && echo "✓ predict.py OK"

      - name: Syntax check — review.py
        run: python -m py_compile review.py && echo "✓ review.py OK"

      - name: Syntax check — scheduler.py
        run: python -m py_compile scheduler.py && echo "✓ scheduler.py OK"

      - name: Validate config imports cleanly
        run: |
          python - <<'EOF'
          from config import (
              URLS, HEADERS, WEIGHTS_GENERAL, WEIGHTS_CLASSIC,
              CLASSIC_RACE_NAMES, JOCKEY_SCORES, TRAINER_SCORES,
              get_draw_bias, setup_dirs,
              RAW_DIR, PRED_DIR, CACHE_DIR,
              PLACES, FORM_RUNS, RACE_CALENDAR,
          )
          print("✓ config.py imports OK")
          EOF

      - name: Validate WEIGHTS sum to 1.0
        run: |
          python - <<'EOF'
          from config import WEIGHTS_GENERAL, WEIGHTS_CLASSIC
          g = sum(WEIGHTS_GENERAL.values())
          c = sum(WEIGHTS_CLASSIC.values())
          assert abs(g - 1.0) < 0.001, f"WEIGHTS_GENERAL = {g}"
          assert abs(c - 1.0) < 0.001, f"WEIGHTS_CLASSIC = {c}"
          print(f"✓ WEIGHTS_GENERAL: {g:.3f}")
          print(f"✓ WEIGHTS_CLASSIC: {c:.3f}")
          EOF

      - name: Validate RACE_CALENDAR format
        run: |
          python - <<'EOF'
          from config import RACE_CALENDAR
          from datetime import datetime
          for rd in RACE_CALENDAR:
              datetime.strptime(rd["date"], "%Y/%m/%d")
              assert rd["venue"] in ("ST", "HV"), f"Bad venue: {rd}"
              datetime.strptime(rd["last_race_time"], "%H:%M")
          print(f"✓ RACE_CALENDAR: {len(RACE_CALENDAR)} meetings validated")
          EOF

name: HKJC Weight Evaluation

on:
  schedule:
    # Runs every Monday at 02:00 HKT = 18:00 UTC on Sunday
    - cron: "0 18 * * 0"

  workflow_dispatch:
    inputs:
      window:
        description: "Number of recent meetings to evaluate"
        required: false
        default: "8"
      iterations:
        description: "Random search iterations"
        required: false
        default: "500"
      save:
        description: "Save improved weights"
        required: false
        default: "true"

jobs:
  evaluate:
    name: Evaluate and Tune Weights
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run weight evaluator
        run: |
          SAVE_FLAG=""
          if [ "${{ github.event.inputs.save }}" = "true" ]; then
            SAVE_FLAG="--save"
          fi
          python eval_weights.py \
            --window "${{ github.event.inputs.window }}" \
            --iterations "${{ github.event.inputs.iterations }}" \
            $SAVE_FLAG

      - name: Commit improved weights
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weights.json data/weight_eval.json || true
          if git diff --cached --quiet; then
            echo "No weight updates to commit."
          else
            git commit -m "🔧 Weekly weight evaluation update"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

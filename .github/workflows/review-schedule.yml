# .github/workflows/review-schedule.yml
# Runs review.py automatically after each race meeting ends
# Fetches actual results, fills actual_pos + hit into predictions XLSX
# Runs at 23:00 HKT daily, with a backup 00:15 HKT run for late finishes.

name: HKJC Review

on:
  schedule:
    # Runs 23:00 HKT = 15:00 UTC every day
    # review.py checks if today was a race day and if races are finished.
    # A second backup run at 00:15 HKT catches late finishes for 23:00 meetings.
    - cron: "0 15 * * *"
    - cron: "15 16 * * *"

  # Manual trigger — specify date + venue to backfill any past meeting
  workflow_dispatch:
    inputs:
      date:
        description: "Race date (YYYY/MM/DD)"
        required: false
        default: ""
      venue:
        description: "Venue (ST or HV)"
        required: false
        default: ""

jobs:
  review:
    name: Fetch Results & Review Predictions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      race_today: ${{ steps.check-race.outputs.race_today }}
      race_tag: ${{ steps.check-race.outputs.race_tag }}
      race_date: ${{ steps.check-race.outputs.race_date }}
      race_venue: ${{ steps.check-race.outputs.race_venue }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers + system libs
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Check if race today and run review
        id: check-race
        env:
          TZ: Asia/Hong_Kong
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            # Manual trigger — always run
            python review.py \
              --date "${{ github.event.inputs.date }}" \
              --venue "${{ github.event.inputs.venue || 'ST' }}"
            echo "race_today=true" >> $GITHUB_OUTPUT
            date_formatted="${{ github.event.inputs.date }}"
            venue_formatted="${{ github.event.inputs.venue || 'ST' }}"
            race_tag="${date_formatted//\//-}_${venue_formatted}"
            echo "race_tag=${race_tag}" >> $GITHUB_OUTPUT
            echo "race_date=${date_formatted}" >> $GITHUB_OUTPUT
            echo "race_venue=${venue_formatted}" >> $GITHUB_OUTPUT
          else
            # Scheduled run — check if race today
            output=$(python scheduler.py --check-and-review 2>&1 || true)
            echo "Scheduler output:"
            echo "$output"
            
            # Parse output for RACE_TODAY flag
            if echo "$output" | grep -q "^RACE_TODAY=true"; then
              echo "race_today=true" >> $GITHUB_OUTPUT
              race_tag=$(echo "$output" | grep "^RACE_TAG=" | cut -d'=' -f2)
              race_date=$(echo "$output" | grep "^RACE_DATE=" | cut -d'=' -f2)
              race_venue=$(echo "$output" | grep "^RACE_VENUE=" | cut -d'=' -f2)
              echo "race_tag=${race_tag}" >> $GITHUB_OUTPUT
              echo "race_date=${race_date}" >> $GITHUB_OUTPUT
              echo "race_venue=${race_venue}" >> $GITHUB_OUTPUT
            else
              echo "race_today=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Sync results to web directory
        if: steps.check-race.outputs.race_today == 'true'
        run: |
          # Copy XLSX files to web directory
          mkdir -p docs/data/predictions docs/data/results
          cp -v data/predictions/*.xlsx docs/data/predictions/ 2>/dev/null || true
          cp -v data/results/*.xlsx data/results/*_crosscheck.json docs/data/results/ 2>/dev/null || true
          
          # Update index.json for web frontend
          python3 << 'PYSCRIPT'
          import json
          from pathlib import Path
          from datetime import datetime
          
          pred_dir = Path("docs/data/predictions")
          pred_dir.mkdir(parents=True, exist_ok=True)
          
          # Find all XLSX files
          entries = []
          for xlsx_file in sorted(pred_dir.glob("*.xlsx"), reverse=True):
              # Parse filename: YYYY-MM-DD_VN.xlsx
              fname = xlsx_file.stem
              parts = fname.split("_")
              if len(parts) >= 2:
                  date_str = parts[0]  # YYYY-MM-DD
                  venue = parts[1]     # VN
                  # Convert to YYYY/MM/DD for display
                  date_display = date_str.replace("-", "/")
                  entries.append({
                      "file": xlsx_file.name,
                      "date": date_display,
                      "venue": venue
                  })
          
          # Write index.json
          index = {"entries": entries, "updated_at": datetime.now().isoformat()}
          with open(pred_dir / "index.json", "w") as f:
              json.dump(index, f, indent=2)
          
          print(f"✓ Updated index.json with {len(entries)} entries")
          PYSCRIPT

      - name: Upload reviewed XLSX
        if: steps.check-race.outputs.race_today == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: review-${{ steps.check-race.outputs.race_tag }}
          path: |
            data/predictions/*.xlsx
            data/results/*.xlsx
            docs/data/predictions/index.json
          retention-days: 90

      - name: Commit reviewed data to repo
        if: steps.check-race.outputs.race_today == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "data/predictions/" ]; then git add data/predictions/; fi
          if [ -d "data/results/" ]; then git add data/results/; fi
          if [ -d "docs/data/" ]; then git add docs/data/; fi
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "📊 Auto-review ${{ steps.check-race.outputs.race_tag }}"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

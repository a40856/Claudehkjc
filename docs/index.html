<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HKJC Pro Analytics</title>
    <!-- Modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <!-- SheetJS to read XLSX -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    <div class="ambient-glow glow-3"></div>

    <div class="app-container">
        <!-- HEADER -->
        <header class="glass-panel main-header slide-down">
            <div class="header-inner">
                <div class="logo">
                    <span class="logo-emoji">🏇</span>
                    <span class="logo-text">NeuralHKJC</span>
                    <span class="badge badge-pro">PRO</span>
                </div>
                <div class="header-meta" id="headerMeta">
                    <div class="pulse-dot"></div>
                    <span id="headerMetaText">Initializing Engine...</span>
                </div>
            </div>
        </header>

        <main>
            <!-- CONTROLS -->
            <div class="glass-panel toolbar fade-in" style="animation-delay: 0.1s">
                <div class="toolbar-left">
                    <div class="input-group">
                        <label for="dateSelect">Projection Date</label>
                        <select id="dateSelect" onchange="loadDay(this.value)">
                            <option value="">Loading Data...</option>
                        </select>
                    </div>
                </div>
                <div class="toolbar-right">
                    <span id="venueTag" class="venue-indicator">--</span>
                    <span id="generatedAt" class="muted-text"></span>
                </div>
            </div>

            <!-- SUMMARY GRID -->
            <section id="summarySection" style="display:none" class="fade-in" style="animation-delay: 0.2s">
                <div class="section-title-wrap">
                    <h2 class="section-title">AI Projections</h2>
                    <p class="section-subtitle">Top 4 modeled predictions across all races</p>
                </div>
                <div class="summary-grid" id="summaryGrid">
                    <!-- Cards injected by app.js -->
                </div>
            </section>

            <!-- CROSS CHECK TABLE -->
            <section id="crosscheckSection" style="display:none" class="fade-in" style="animation-delay: 0.25s">
                <div class="section-title-wrap">
                    <h2 class="section-title">Prediction vs Actual Cross-Check</h2>
                    <p class="section-subtitle">Top 4 predicted horses vs actual finishing positions</p>
                </div>
                <div id="crosscheckTableContainer"></div>
            </section>

            <!-- FULL FIELD DETAILS -->
            <section id="detailSection" class="fade-in" style="animation-delay: 0.3s">
                <!-- Details injected by app.js -->
            </section>
        </main>

        <footer class="glass-panel main-footer fade-in" style="animation-delay: 0.4s">
            <p>Advanced HKJC Prediction Engine • Data-driven projection • Not financial advice</p>
        </footer>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Parsing XLSX Data...</div>
    </div>

    <script src="app.js"></script>
</body>
</html>

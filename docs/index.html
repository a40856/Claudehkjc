<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HKJC Race Predictor</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header>
        <div class="header-inner">
            <div class="logo">🏇 HKJC Predictor</div>
            <div class="header-meta" id="headerMeta">Loading...</div>
        </div>
    </header>

    <main>
        <div class="toolbar">
            <div class="toolbar-left">
                <label>Race Day</label>
                <select id="dateSelect" onchange="loadDay(this.value)"></select>
            </div>
            <div class="toolbar-right">
                <span id="venueTag" class="badge"></span>
                <span id="generatedAt" class="muted"></span>
            </div>
        </div>

        <section id="summarySection" style="display:none">
            <h2 class="section-title">Day Summary — Top 4 Picks</h2>
            <div class="table-wrap">
                <table id="summaryTable">
                    <thead>
                        <tr>
                            <th>Race</th>
                            <th>Class / Dist</th>
                            <th>🥇 1st Pick</th>
                            <th>🥈 2nd Pick</th>
                            <th>🥉 3rd Pick</th>
                            <th>4th Pick</th>
                            <th>💰 Value Bets</th>
                        </tr>
                    </thead>
                    <tbody id="summaryBody"></tbody>
                </table>
            </div>
        </section>

        <section id="detailSection"></section>
    </main>

    <footer>
        <p>Predictions generated by predict.py · For reference only · Not financial advice</p>
    </footer>

    <script src="app.js"></script>
</body>

</html>
